name: Check Links and Send Failures to Slack

on:
  workflow_dispatch:
  schedule:
    - cron: "45 11 * * MON"
permissions:
  contents: read
jobs:
  check-links-and-send-failures-to-slack:
    name: Check Links and Send Failures to Slack
    runs-on: ubuntu-latest
   
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci
      - name: Find and list broken links
        id: check-links
        run: node utils/check-links.mjs

      - name: Send message to Slack
        if: steps.check-links.outputs.has404 == 'true'
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_BROKEN_LINKS_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            has404: "${{ steps.check-links.outputs.has404 }}"
            404_length: "${{ steps.check-links.outputs.notFoundLength }}"
            message: "Broken links found"
            run_url: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"