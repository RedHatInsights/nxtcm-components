name: Publish ROSA HCP Wizard

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  quality-gates:
    name: Wizard Quality Gates
    if: github.event.release.target_commitish == 'main' && startsWith(github.event.release.tag_name, 'nxtcm-rosa-hcp-wizard-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify release tag is reachable from main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "::error::Release tag $GITHUB_REF_NAME ($GITHUB_SHA) is not reachable from main"
            exit 1
          fi

      - name: Verify release tag matches wizard package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          expected="nxtcm-rosa-hcp-wizard-v$(node -p "require('./packages/nxtcm-rosa-hcp-wizard/package.json').version")"
          if [ "$RELEASE_TAG" != "$expected" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match expected $expected"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Check lockfile for git-based dependencies
        run: |
          if grep -qE '"resolved":\s*"(git\+|git:|github:)' package-lock.json; then
            echo "::error::git-based dependency found in lockfile (supply chain risk)"
            exit 1
          fi

      - name: Run wizard lint
        run: npm run lint -w packages/nxtcm-rosa-hcp-wizard

      - name: Run wizard type-check
        run: npm run type-check -w packages/nxtcm-rosa-hcp-wizard

      - name: Run wizard unit tests
        run: npm run test -w packages/nxtcm-rosa-hcp-wizard

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run wizard component tests
        run: npm run test:ct -w packages/nxtcm-rosa-hcp-wizard

      - name: Build wizard package
        run: npm run build -w packages/nxtcm-rosa-hcp-wizard

  publish:
    name: Publish to npm
    if: github.repository == 'RedHatInsights/nxtcm-components'
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: 'package.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build wizard package
        run: npm run build -w packages/nxtcm-rosa-hcp-wizard

      - name: Publish wizard package
        run: npm publish -w packages/nxtcm-rosa-hcp-wizard --provenance --access public
