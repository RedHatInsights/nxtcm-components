name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run prettier:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Run TypeScript type checking
        run: npm run type-check

  test:
    name: Component Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright component tests
        id: ct_run
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/playwright-ct-results.json
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/playwright-ct-junit.xml
        run: >-
          npx playwright test -c playwright-ct.config.ts
          --reporter=line,html,json,junit

      - name: Build per-test CT summary
        if: always()
        run: |
          node utils/summarize-playwright-ct.mjs \
            --json test-results/playwright-ct-results.json \
            --markdown test-results/playwright-ct-summary.md \
            --summary-json test-results/playwright-ct-summary.json
          cat test-results/playwright-ct-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-ct-report
          path: |
            playwright-report/
            test-results/playwright-ct-results.json
            test-results/playwright-ct-junit.xml
            test-results/playwright-ct-summary.md
            test-results/playwright-ct-summary.json
          retention-days: 7

      - name: Fail job if CT failed
        if: steps.ct_run.outcome == 'failure'
        run: exit 1

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Build library
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Install subpackage dependencies
        run: cd packages/react-form-wizard && npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 7
